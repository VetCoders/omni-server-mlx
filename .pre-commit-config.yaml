# .pre-commit-config.yaml
# Extended by LibraxisAI with ruff, semgrep, mypy, and loctree
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-ast
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-json
      - id: check-toml

  # Ruff - ultra-fast Python linter & formatter (replaces black, isort, flake8)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Keep black for compatibility (ruff-format is drop-in replacement)
  - repo: https://github.com/psf/black
    rev: 24.2.0
    hooks:
      - id: black
        language_version: python3
        args: [--line-length=88, --check]
        stages: [manual]  # Run manually, ruff-format is primary

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --check-only]
        stages: [manual]  # Run manually, ruff handles imports

  # Mypy - static type checker
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.0
          - fastapi>=0.100
          - httpx>=0.25
          - types-redis
        args: [--ignore-missing-imports, --no-strict-optional]
        exclude: ^(tests/|examples/)

  # Semgrep - security scanner
  - repo: https://github.com/semgrep/semgrep
    rev: v1.96.0
    hooks:
      - id: semgrep
        args: ['--config', 'auto', '--error', '--skip-unknown-extensions']
        stages: [pre-push]  # Only on push (slower)

  # Bandit - Python security linter
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml', '-r', 'src/']
        additional_dependencies: ['bandit[toml]']
        exclude: ^tests/

  # Loctree code quality checks - contributed by LibraxisAI (optional, warnings only)
  - repo: local
    hooks:
      - id: loctree-deadexports
        name: Check for dead exports
        entry: bash -c 'if command -v loct &>/dev/null; then loct deadexports 2>/dev/null || true; else echo "loct not installed, skipping"; fi'
        language: system
        pass_filenames: false
        types: [python]
        verbose: true

      - id: loctree-twins
        name: Check for duplicate definitions
        entry: bash -c 'if command -v loct &>/dev/null; then loct twins 2>/dev/null || true; else echo "loct not installed, skipping"; fi'
        language: system
        pass_filenames: false
        types: [python]
        verbose: true

      - id: pytest-check
        name: Run pytest (fast tests only)
        entry: bash -c 'uv run pytest tests/ -x -q --tb=no -m "not slow" 2>/dev/null'
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-push]
